name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            webui:
              - 'webui/**'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake python3

      - name: Install deps (root)
        run: npm ci

      - name: Setup project
        run: npm run setup

      - name: Build core + addon
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Install deps (webui)
        run: npm ci --prefix webui
        if: steps.changes.outputs.webui == 'true'

      - name: Lint webui
        run: npm --prefix webui run lint
        if: steps.changes.outputs.webui == 'true'

      - name: Build webui
        run: npm --prefix webui run build
        if: steps.changes.outputs.webui == 'true'
