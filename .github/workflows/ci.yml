name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            webui:
              - 'webui/**'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake python3 ccache ninja-build

      - name: Set build parallelism
        run: echo "CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ matrix.node }}-${{ github.ref_name }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ matrix.node }}-

      - name: Install deps (root)
        run: npm ci

      - name: Setup project
        run: npm run setup

      - name: Build core + addon
        run: npm run build
        env:
          CCACHE_DIR: /home/runner/.ccache
          CCACHE_BASEDIR: /home/runner/work/AstraRP/AstraRP
          CCACHE_COMPILERCHECK: content
          CMAKE_GENERATOR: Ninja
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache

      - name: Run tests
        run: npm test:only

      - name: Install deps (webui)
        run: npm ci --prefix webui
        if: steps.changes.outputs.webui == 'true'

      - name: Lint webui
        run: npm --prefix webui run lint
        if: steps.changes.outputs.webui == 'true'

      - name: Build webui
        run: npm --prefix webui run build
        if: steps.changes.outputs.webui == 'true'
